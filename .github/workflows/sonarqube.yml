name: DevSecOps - SonarQube y Telegram

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sonarqube-analysis:
    name: SonarQube Scan y alerta Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Definir proyecto de SonarQube
        shell: bash
        run: |
          PROJECT_KEY="${{ vars.SONAR_PROJECT_KEY }}"
          if [ -z "$PROJECT_KEY" ]; then
            PROJECT_KEY="${{ github.event.repository.name }}"
          fi
          echo "SONAR_PROJECT_KEY=$PROJECT_KEY" >> "$GITHUB_ENV"

      - name: Detectar archivos cambiados
        id: changed_files
        shell: bash
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | tr '\n' ',' | sed 's/,$//')
          else
            CHANGED_FILES=$(git ls-files | tr '\n' ',' | sed 's/,$//')
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "No se detectaron archivos cambiados en este commit."
            exit 0
          fi

          echo "sonar_inclusions=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

      - name: Ejecutar SonarQube Community Scanner
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          docker run --rm \
            -e SONAR_HOST_URL="${SONAR_HOST_URL}" \
            -e SONAR_TOKEN="${SONAR_TOKEN}" \
            -v "${{ github.workspace }}:/usr/src" \
            -w /usr/src \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.inclusions="${{ steps.changed_files.outputs.sonar_inclusions }}"

      - name: Obtener estado del Quality Gate
        id: quality_gate
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          QUALITY_GATE_JSON=$(curl -s -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}")
          STATUS=$(QUALITY_GATE_JSON="$QUALITY_GATE_JSON" python -c "import json, os; data = json.loads(os.environ['QUALITY_GATE_JSON']); print(data.get('projectStatus', {}).get('status', 'NONE'))")
          echo "quality_gate_status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Generar mensaje para Telegram
        if: always()
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ env.SONAR_PROJECT_KEY }}
          QUALITY_GATE_STATUS: ${{ steps.quality_gate.outputs.quality_gate_status }}
        run: |
          python tools/build_sonar_telegram_message.py

      - name: Enviar mensaje a Telegram
        if: always()
        shell: bash
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@telegram_msg.txt"

      - name: Fallar el flujo si el Quality Gate no cumple
        if: steps.quality_gate.outputs.quality_gate_status != 'OK'
        run: exit 1