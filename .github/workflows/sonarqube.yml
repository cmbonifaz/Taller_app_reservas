name: DevSecOps - SAST & DAST con Telegram

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  sonarqube-analysis:
    name: SonarQube Scan y alerta Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar SonarQube Scanner
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Verificar Quality Gate
        id: quality_gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Obtener metricas de SonarQube
        id: sonar_metrics
        if: always()
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          CLEAN_HOST_URL="${SONAR_HOST_URL%/}"
          PROJECT_KEY="taller_app_reservas"
          METRICS_URL="${CLEAN_HOST_URL}/api/measures/component?component=${PROJECT_KEY}&metricKeys=bugs,vulnerabilities,code_smells,ncloc,duplicated_lines_density,security_rating,reliability_rating,sqale_rating"

          echo "Consultando metricas en: ${METRICS_URL}"

          METRICS="{}"
          for i in 1 2 3 4 5; do
            METRICS_RAW=$(curl -s -u "${SONAR_TOKEN}:" \
              -H "ngrok-skip-browser-warning: true" \
              "${METRICS_URL}")

            echo "Intento ${i} - Respuesta SonarQube: ${METRICS_RAW}"

            if echo "${METRICS_RAW}" | grep -q '"component"'; then
              METRICS="${METRICS_RAW}"
              echo "Metricas obtenidas en el intento ${i}."
              break
            else
              echo "Intento ${i} fallido. Esperando 10 segundos..."
              sleep 10
            fi
          done

          echo "${METRICS}" > /tmp/sonar_metrics.json
          python3 tools/parse_sonar_metrics.py

      - name: Generar mensaje para Telegram
        if: always()
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: taller_app_reservas
          QUALITY_GATE_STATUS: ${{ steps.quality_gate.outcome == 'success' && 'OK' || 'ERROR' }}
          SONAR_BUGS: ${{ env.SONAR_BUGS }}
          SONAR_VULNERABILITIES: ${{ env.SONAR_VULNERABILITIES }}
          SONAR_CODE_SMELLS: ${{ env.SONAR_CODE_SMELLS }}
          SONAR_NCLOC: ${{ env.SONAR_NCLOC }}
          SONAR_DUPLICATION: ${{ env.SONAR_DUPLICATION }}
          SONAR_SECURITY_RATING: ${{ env.SONAR_SECURITY_RATING }}
          SONAR_RELIABILITY_RATING: ${{ env.SONAR_RELIABILITY_RATING }}
          SONAR_MAINTAINABILITY_RATING: ${{ env.SONAR_MAINTAINABILITY_RATING }}
        run: |
          python tools/build_sonar_telegram_message.py

      - name: Enviar mensaje a Telegram
        if: always()
        shell: bash
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@telegram_msg.txt"

      - name: Fallar el flujo si el Quality Gate no cumple
        if: steps.quality_gate.outcome != 'success'
        run: exit 1

  zap-dast-analysis:
    name: OWASP ZAP DAST y alerta Telegram
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Crear archivo de entorno para frontend
        run: |
          cat << 'EOF' > frontend/.env.production.local
          NEXT_PUBLIC_API_URL=/api/auth
          NEXT_PUBLIC_BOOKING_URL=/api/bookings
          NEXT_PUBLIC_USER_URL=/api/users
          EOF

      - name: Levantar aplicación con Docker Compose
        run: docker compose up -d

      - name: Esperar a que el frontend responda
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          artifact_name: 'ZAP_Report_API'

      - name: Generar mensaje para Telegram
        if: always()
        shell: bash
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          cat << 'EOF' > telegram_dast_msg.txt
          🕷️ ALERTA DAST
          Informe automático generado por OWASP ZAP Baseline Scan
          
          ━━━━━━━━━━━━━━━━━━━━
          
          📌 Resumen del evento
          Rama: ${{ env.GITHUB_REF_NAME }}
          
          ━━━━━━━━━━━━━━━━━━━━
          
          🔗 Enlaces
          Artefactos y Reporte ZAP: ${{ env.GITHUB_SERVER_URL }}/${{ env.GITHUB_REPOSITORY }}/actions/runs/${{ env.GITHUB_RUN_ID }}
          EOF

      - name: Enviar mensaje a Telegram
        if: always()
        shell: bash
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@telegram_dast_msg.txt"

      - name: Apagar aplicación
        if: always()
        run: docker compose down