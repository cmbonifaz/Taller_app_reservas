name: DevSecOps - SonarQube y Telegram

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  sonarqube-analysis:
    name: SonarQube Scan y alerta Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar SonarQube Scanner
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Capturar métricas inmediatamente después del scan, mientras la conexión está activa
      - name: Obtener métricas de SonarQube
        id: sonar_metrics
        if: always()
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          # Eliminar barra diagonal final de SONAR_HOST_URL para evitar errores de ruta (//api/...)
          CLEAN_HOST_URL="${SONAR_HOST_URL%/}"
          
          echo "Consultando métricas en: ${CLEAN_HOST_URL}/api/measures/component?component=taller_app_reservas"
          
          # Realizar la consulta a la API de SonarQube sin -f para poder capturar errores en los logs
          METRICS_RAW=$(curl -s -u "${SONAR_TOKEN}:" \
            -H "ngrok-skip-browser-warning: true" \
            "${CLEAN_HOST_URL}/api/measures/component?component=taller_app_reservas&metricKeys=bugs,vulnerabilities,code_smells,ncloc,duplicated_lines_density,security_rating,reliability_rating,maintainability_rating")
          
          echo "Respuesta de SonarQube: ${METRICS_RAW}"
          
          # Validar si obtuvimos una respuesta JSON que contenga 'component'
          if echo "${METRICS_RAW}" | grep -q '"component"'; then
            METRICS="${METRICS_RAW}"
          else
            echo "Error: No se recibió una respuesta válida de SonarQube."
            METRICS="{}"
          fi

          echo "SONAR_BUGS=$(echo $METRICS | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); m={x['metric']:x.get('value','0') for x in d.get('component',{}).get('measures',[])}; print(m.get('bugs','0'))" 2>/dev/null || echo '0')" >> "$GITHUB_ENV"
          echo "SONAR_VULNERABILITIES=$(echo $METRICS | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); m={x['metric']:x.get('value','0') for x in d.get('component',{}).get('measures',[])}; print(m.get('vulnerabilities','0'))" 2>/dev/null || echo '0')" >> "$GITHUB_ENV"
          echo "SONAR_CODE_SMELLS=$(echo $METRICS | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); m={x['metric']:x.get('value','0') for x in d.get('component',{}).get('measures',[])}; print(m.get('code_smells','0'))" 2>/dev/null || echo '0')" >> "$GITHUB_ENV"
          echo "SONAR_NCLOC=$(echo $METRICS | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); m={x['metric']:x.get('value','0') for x in d.get('component',{}).get('measures',[])}; print(m.get('ncloc','0'))" 2>/dev/null || echo '0')" >> "$GITHUB_ENV"
          echo "SONAR_DUPLICATION=$(echo $METRICS | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); m={x['metric']:x.get('value','0') for x in d.get('component',{}).get('measures',[])}; print(m.get('duplicated_lines_density','0'))" 2>/dev/null || echo '0')" >> "$GITHUB_ENV"
          echo "SONAR_SECURITY_RATING=$(echo $METRICS | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); m={x['metric']:x.get('value','') for x in d.get('component',{}).get('measures',[])}; print(m.get('security_rating',''))" 2>/dev/null || echo '')" >> "$GITHUB_ENV"
          echo "SONAR_RELIABILITY_RATING=$(echo $METRICS | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); m={x['metric']:x.get('value','') for x in d.get('component',{}).get('measures',[])}; print(m.get('reliability_rating',''))" 2>/dev/null || echo '')" >> "$GITHUB_ENV"
          echo "SONAR_MAINTAINABILITY_RATING=$(echo $METRICS | python3 -c "import json,sys; d=json.loads(sys.stdin.read()); m={x['metric']:x.get('value','') for x in d.get('component',{}).get('measures',[])}; print(m.get('maintainability_rating',''))" 2>/dev/null || echo '')" >> "$GITHUB_ENV"

      - name: Verificar Quality Gate
        id: quality_gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Generar mensaje para Telegram
        if: always()
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: taller_app_reservas
          QUALITY_GATE_STATUS: ${{ steps.quality_gate.outcome == 'success' && 'OK' || 'ERROR' }}
          # Métricas pre-capturadas (evita llamadas API extra)
          SONAR_BUGS: ${{ env.SONAR_BUGS }}
          SONAR_VULNERABILITIES: ${{ env.SONAR_VULNERABILITIES }}
          SONAR_CODE_SMELLS: ${{ env.SONAR_CODE_SMELLS }}
          SONAR_NCLOC: ${{ env.SONAR_NCLOC }}
          SONAR_DUPLICATION: ${{ env.SONAR_DUPLICATION }}
          SONAR_SECURITY_RATING: ${{ env.SONAR_SECURITY_RATING }}
          SONAR_RELIABILITY_RATING: ${{ env.SONAR_RELIABILITY_RATING }}
          SONAR_MAINTAINABILITY_RATING: ${{ env.SONAR_MAINTAINABILITY_RATING }}
        run: |
          python tools/build_sonar_telegram_message.py

      - name: Enviar mensaje a Telegram
        if: always()
        shell: bash
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@telegram_msg.txt"

      - name: Fallar el flujo si el Quality Gate no cumple
        if: steps.quality_gate.outcome != 'success'
        run: exit 1