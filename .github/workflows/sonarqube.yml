name: DevSecOps - SonarQube y Telegram

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  sonarqube-analysis:
    name: SonarQube Scan y alerta Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar SonarQube Scanner
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # El Quality Gate hace polling interno y espera a que SonarQube
      # termine de procesar el análisis antes de continuar.
      - name: Verificar Quality Gate
        id: quality_gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        continue-on-error: true
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Las métricas se consultan DESPUÉS del Quality Gate (que garantiza que
      # SonarQube ya terminó de persistir los datos).
      # Se usa un heredoc de Python para evitar conflictos de comillas en bash.
      - name: Obtener métricas de SonarQube
        id: sonar_metrics
        if: always()
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          CLEAN_HOST_URL="${SONAR_HOST_URL%/}"
          PROJECT_KEY="taller_app_reservas"
          METRICS_URL="${CLEAN_HOST_URL}/api/measures/component?component=${PROJECT_KEY}&metricKeys=bugs,vulnerabilities,code_smells,ncloc,duplicated_lines_density,security_rating,reliability_rating,maintainability_rating"

          echo "Consultando métricas en: ${METRICS_URL}"

          # Retry hasta 5 intentos con 10 segundos de espera entre cada uno
          METRICS="{}"
          for i in 1 2 3 4 5; do
            METRICS_RAW=$(curl -s -u "${SONAR_TOKEN}:" \
              -H "ngrok-skip-browser-warning: true" \
              "${METRICS_URL}")

            echo "Intento ${i} - Respuesta de SonarQube: ${METRICS_RAW}"

            if echo "${METRICS_RAW}" | grep -q '"component"'; then
              METRICS="${METRICS_RAW}"
              echo "Métricas obtenidas correctamente en el intento ${i}."
              break
            else
              echo "Intento ${i} fallido. Esperando 10 segundos..."
              sleep 10
            fi
          done

          # Guardar JSON en archivo temporal para evitar problemas de comillas en bash
          echo "$METRICS" > /tmp/sonar_metrics.json

          # Usar heredoc de Python: sin conflictos de comillas, parsing limpio
          python3 << 'PYEOF'
import json, os, sys

with open('/tmp/sonar_metrics.json', 'r', encoding='utf-8') as f:
    raw = f.read().strip()

try:
    data = json.loads(raw)
except json.JSONDecodeError as e:
    print(f"ERROR al parsear JSON: {e}", file=sys.stderr)
    print(f"Contenido recibido: {raw[:500]}", file=sys.stderr)
    data = {}

measures = {
    x.get('metric', ''): x.get('value', '')
    for x in data.get('component', {}).get('measures', [])
}

print(f"Métricas extraídas: {measures}")

github_env = os.environ.get('GITHUB_ENV', '')
if not github_env:
    print("ERROR: GITHUB_ENV no está definido", file=sys.stderr)
    sys.exit(1)

with open(github_env, 'a', encoding='utf-8') as env_file:
    env_file.write(f"SONAR_BUGS={measures.get('bugs', '0')}\n")
    env_file.write(f"SONAR_VULNERABILITIES={measures.get('vulnerabilities', '0')}\n")
    env_file.write(f"SONAR_CODE_SMELLS={measures.get('code_smells', '0')}\n")
    env_file.write(f"SONAR_NCLOC={measures.get('ncloc', '0')}\n")
    env_file.write(f"SONAR_DUPLICATION={measures.get('duplicated_lines_density', '0')}\n")
    env_file.write(f"SONAR_SECURITY_RATING={measures.get('security_rating', '')}\n")
    env_file.write(f"SONAR_RELIABILITY_RATING={measures.get('reliability_rating', '')}\n")
    env_file.write(f"SONAR_MAINTAINABILITY_RATING={measures.get('maintainability_rating', '')}\n")

print("Variables escritas a GITHUB_ENV exitosamente.")
PYEOF

      - name: Generar mensaje para Telegram
        if: always()
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: taller_app_reservas
          QUALITY_GATE_STATUS: ${{ steps.quality_gate.outcome == 'success' && 'OK' || 'ERROR' }}
          # Métricas pre-capturadas
          SONAR_BUGS: ${{ env.SONAR_BUGS }}
          SONAR_VULNERABILITIES: ${{ env.SONAR_VULNERABILITIES }}
          SONAR_CODE_SMELLS: ${{ env.SONAR_CODE_SMELLS }}
          SONAR_NCLOC: ${{ env.SONAR_NCLOC }}
          SONAR_DUPLICATION: ${{ env.SONAR_DUPLICATION }}
          SONAR_SECURITY_RATING: ${{ env.SONAR_SECURITY_RATING }}
          SONAR_RELIABILITY_RATING: ${{ env.SONAR_RELIABILITY_RATING }}
          SONAR_MAINTAINABILITY_RATING: ${{ env.SONAR_MAINTAINABILITY_RATING }}
        run: |
          python tools/build_sonar_telegram_message.py

      - name: Enviar mensaje a Telegram
        if: always()
        shell: bash
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@telegram_msg.txt"

      - name: Fallar el flujo si el Quality Gate no cumple
        if: steps.quality_gate.outcome != 'success'
        run: exit 1