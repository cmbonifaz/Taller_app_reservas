name: DevSecOps - SonarQube y Telegram

on:
  push:
    branches:
      - main
      - develop
      - test
  pull_request:
    branches:
      - main
      - develop
      - test
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sonarqube-analysis:
    name: SonarQube Scan y alerta Telegram
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Definir proyecto de SonarQube
        shell: bash
        run: |
          PROJECT_KEY="${{ vars.SONAR_PROJECT_KEY }}"
          if [ -z "$PROJECT_KEY" ]; then
            PROJECT_KEY="${{ github.event.repository.name }}"
          fi
          echo "SONAR_PROJECT_KEY=$PROJECT_KEY" >> "$GITHUB_ENV"

      - name: Ejecutar SonarQube Community Scanner
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            EXTRA_ARGS="-Dsonar.pullrequest.key=${{ github.event.pull_request.number }} -Dsonar.pullrequest.branch=${{ github.head_ref }} -Dsonar.pullrequest.base=${{ github.base_ref }}"
          else
            EXTRA_ARGS="-Dsonar.branch.name=${{ github.ref_name }}"
          fi

          docker run --rm \
            -e SONAR_HOST_URL="${SONAR_HOST_URL}" \
            -e SONAR_TOKEN="${SONAR_TOKEN}" \
            -v "${{ github.workspace }}:/usr/src" \
            -w /usr/src \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            $EXTRA_ARGS

      - name: Obtener estado del Quality Gate
        id: quality_gate
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            QUERY="pullRequest=${{ github.event.pull_request.number }}"
          else
            QUERY="branch=${{ github.ref_name }}"
          fi

          export QUALITY_GATE_JSON=$(curl -s -u "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}&${QUERY}")
          STATUS=$(python - <<'PY'
import json, os
data = json.loads(os.environ['QUALITY_GATE_JSON'])
print(data.get('projectStatus', {}).get('status', 'NONE'))
PY
)
          echo "quality_gate_status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Generar mensaje para Telegram
        if: always()
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_KEY: ${{ env.SONAR_PROJECT_KEY }}
          SONAR_PR_KEY: ${{ github.event.pull_request.number }}
          QUALITY_GATE_STATUS: ${{ steps.quality_gate.outputs.quality_gate_status }}
        run: |
          python tools/build_sonar_telegram_message.py

      - name: Enviar mensaje a Telegram
        if: always()
        shell: bash
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text@telegram_msg.txt"

      - name: Fallar el flujo si el Quality Gate no cumple
        if: steps.quality_gate.outputs.quality_gate_status != 'OK'
        run: exit 1